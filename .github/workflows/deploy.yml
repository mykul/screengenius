# Auto-deploy the site to Hostinger over FTP on every push to `main`.
#
# REQUIRED REPOSITORY SECRETS (Settings → Secrets and variables → Actions → New repository secret):
#   FTP_SERVER    e.g. ftp.yourdomain.com  (Hostinger hPanel → Files → FTP Accounts → "FTP Host/IP")
#   FTP_USERNAME  your FTP account username (from the same FTP Accounts page)
#   FTP_PASSWORD  that FTP account's password
#
# server-dir below is the folder on the server to publish into. For most Hostinger
# accounts the web root is `public_html/`. If after the first run your files land in a
# nested public_html/public_html folder (or don't appear), adjust this value.
#
# NOTE: Use ONE deploy mechanism. If you enable this Action, turn OFF auto-deploy in
# Hostinger's Git tool so the two don't fight over the web root. (Leaving Hostinger Git
# set to manual is fine.)

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a deploy by hand from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: public_html/
          # Don't upload repo/meta files to the live site
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            CLAUDE.md
            README.md
